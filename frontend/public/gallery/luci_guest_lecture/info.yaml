title: Luci André Knudsen gjesteforelesning
description: "Luci André Knudsen er en norsk utvikler og lektor ved UiA. Hen har bakgrunn i Oauth2 og openid connect, og i denne gikk igjennom hva det er, hvordan det fungerer, og viste noen praktiske eksempler. Bilder tatt av William Skauge."
